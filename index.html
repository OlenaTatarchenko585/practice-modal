<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/practice-modal/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla App Template</title>
    <script type="module" crossorigin src="/practice-modal/index.js"></script>
    <link rel="stylesheet" crossorigin href="/practice-modal/assets/index-Du37qOmZ.css">
    <link rel="stylesheet" crossorigin href="/practice-modal/assets/styles-DvPDDfy5.css">
  </head>
  <body>
    <main>
      <button type="button" data-order-modal-open>Відкрити модалку</button>
      <div class="backdrop is-hidden" data-order-modal>
  <div class="modal">
    <button type="button" class="close-btn" data-order-modal-close>
      &times;
    </button>

    <h2 class="modal-title">Замовити зворотний зв'язок</h2>

    <form class="order-form">
      <div class="form-field">
        <label class="form-label" for="user-name">Ім'я*</label>
        <input
          class="form-input"
          type="text"
          name="userName"
          id="user-name"
          placeholder="Дмитро"
          required
        />
      </div>

      <div class="form-field">
        <label class="form-label" for="user-phone">Телефон*</label>
        <input
          class="form-input"
          type="tel"
          name="userPhone"
          id="user-phone"
          placeholder="38 099 123 22 11"
          required
        />
      </div>

      <div class="form-field">
        <label class="form-label" for="user-comment">Коментар</label>
        <textarea
          class="form-textarea"
          name="userComment"
          id="user-comment"
          placeholder="Введіть ваш коментар"
        ></textarea>
      </div>
      <button type="submit">Надіслати заявку</button>
    </form>
  </div>
</div>

    </main>

  </body>
</html>
